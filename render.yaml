services:
  - type: web
    name: reskill-server
    runtime: node
    plan: free
    repo: https://github.com/a812800979-maker/ReSkill
    branch: main
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: HOST
        value: 0.0.0.0

  - type: web
    name: reskill-web
    runtime: node
    plan: free
    repo: https://github.com/a812800979-maker/ReSkill
    branch: main
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: reskill-server
          type: web
          property: host
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          name: reskill-server
          type: web
          property: host
